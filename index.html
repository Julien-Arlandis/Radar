<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR 5/5 - v2.0.8 - Target Centered</title>
    <style>
        :root {
            --win: #27ae60; --loss: #e74c3c; --accent: #ffcc00;
            --bg: #0a0a0a; --card: #151515;
            --scratch-grey: #888;
            --coin-bg: #ffcc00;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; touch-action: manipulation; }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--bg); color: white;
            height: 100dvh; width: 100vw; 
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; user-select: none; -webkit-user-select: none;
        }

        .header {
            width: 100%; max-width: 500px; padding: 2vh 10px;
            display: flex; justify-content: space-around; align-items: center;
            background: #000; border-bottom: 2px solid #222; flex-shrink: 0;
            z-index: 10;
        }

        .stat-val { font-size: 1.3em; font-weight: bold; }
        .stat-label { color: #666; font-size: 0.6em; display: block; text-transform: uppercase; }

        .container {
            width: 100%; max-width: 500px; flex: 1;
            background: var(--card); display: flex; flex-direction: column;
            border-left: 1px solid #333; border-right: 1px solid #333; min-height: 0;
            position: relative;
        }

        .game-zone { flex: 3; display: flex; flex-direction: column; padding: 10px; min-height: 0; }

        .grid-master { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, 1fr); gap: 8px; width: 100%; height: 100%; margin: auto;
        }
        
        .sq {
            width: 100%; height: 100%; background: #222; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #444; position: relative; overflow: hidden;
            transition: border 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- DUAL ZONE (TRIANGLES) --- */
        .dual-container { position: absolute; width: 100%; height: 100%; z-index: 20; }
        
        .zone-scratch { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--scratch-grey); clip-path: polygon(0 0, 100% 0, 0 100%); 
            transition: background 0.2s; cursor: pointer;
        }
        .zone-scratch:hover { background: #999; }
        .zone-scratch .icon { 
            position: absolute; top: 33.33%; left: 33.33%; 
            transform: translate(-50%, -50%);
            font-size: clamp(1.1em, 3.2vh, 1.5em);
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
        }

        .zone-bet { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--win); clip-path: polygon(100% 0, 100% 100%, 0 100%); 
            transition: background 0.2s; cursor: pointer;
        }
        .zone-bet:hover { background: #2ecc71; }
        .zone-bet .icon { 
            position: absolute; top: 66.66%; left: 66.66%; 
            transform: translate(-50%, -50%);
            font-size: clamp(1.3em, 3.8vh, 1.8em);
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
        }

        .sq.open .dual-container { display: none; }

        /* --- MISE FINALE : CENTRAGE ABSOLU --- */
        .final-bet-container { 
            position: absolute; top:0; left:0; width: 100%; height: 100%; 
            background: var(--win); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; /* Centrage Flex */
            cursor: pointer; z-index: 30;
            transition: background 0.2s ease, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .final-bet-container .icon { 
            font-size: 5em; line-height: 1; /* Aligné sur le flux flex */
            pointer-events: none; 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
        }
        .final-bet-container:hover { background: #2ecc71; transform: scale(1.05); }
        .final-bet-container:hover .icon { transform: scale(1.1); }

        /* --- BORDURES FIN --- */
        .sq.final-win { border: 5px solid var(--win) !important; box-shadow: 0 0 20px var(--win); z-index: 50; }
        .sq.final-loss { border: 5px solid var(--loss) !important; box-shadow: 0 0 20px var(--loss); z-index: 50; }

        /* --- PIÈCES PREMIUM --- */
        .reveal-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #111; opacity: 0; z-index: 5; }
        .sq.open .reveal-content { opacity: 1; }
        .win-coin { width: 75%; height: 75%; max-width: 70px; max-height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; background: var(--coin-bg); box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 0 15px rgba(255, 204, 0, 0.4); border: 3px solid #e6b800; color: #000; }
        .loss-coin { width: 75%; height: 75%; max-width: 70px; max-height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; background: #333; border: 3px solid #444; color: #666; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        .terminal { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; min-height: 120px; }
        .btn-main { height: 60px; width: 90%; max-width: 400px; border-radius: 12px; font-weight: bold; cursor: pointer; background: var(--accent); color: black; font-size: 1.1em; box-shadow: 0 5px 0 #b38f00; border:none; transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.1s ease; position: relative; top: 0; }
        .btn-main:hover { background: #ffe066; transform: translateY(-2px); box-shadow: 0 7px 0 #b38f00; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #b38f00; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 3px solid var(--accent); width: 85%; max-width: 380px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .paytable { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 0.8em; background: #111; }
        .paytable th, .paytable td { padding: 10px; border: 1px solid #333; text-align: center; }
        .paytable th { background: #222; color: var(--accent); }

        .footer { width: 100%; max-width: 500px; padding: 1vh 15px; display: flex; justify-content: space-around; align-items: center; background: #000; font-size: 0.6em; color: #444; border-top: 1px solid #222; }
    </style>
</head>
<body>

<div class="header">
    <div class="stat-box"><span class="stat-label">SOLDE</span><div id="bal" class="stat-val" style="color:var(--win)">100.00</div></div>
    <div class="stat-box"><span class="stat-label">TAXES BANQUE</span><div id="global-tax" class="stat-val" style="color:var(--loss)">0.00</div></div>
</div>

<div class="container">
    <div class="game-zone"><div class="grid-master" id="grid"></div></div>
    <div id="terminal" class="terminal">
        <div id="ev-display" style="font-size: 0.85em; color: var(--accent); margin-bottom: 10px; background: rgba(255, 204, 0, 0.1); padding: 5px 15px; border-radius: 20px; display: none; border: 1px solid rgba(255, 204, 0, 0.3);">ESPÉRANCE DE GAIN : 0.00€</div>
        <button id="btn-buy" class="btn-main" onclick="buy()">ACHETER TICKET (10€)</button>
        <div id="res-zone"></div>
    </div>
</div>

<div class="footer">
    <button style="background: #333; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 1.2em;" onclick="toggleModal(true)">RÈGLES</button>
    <label><input type="checkbox" id="sound-on" checked> SON ACTIF</label>
    <span>v2.0.8</span>
</div>

<div id="rulesModal" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--accent)">RÈGLES DU JEU</h2>
        <p>• <b>🔍 Zone Grise</b> : Gratter (0.10€)</p>
        <p>• <b>🎯 Zone Verte</b> : Miser (0.10€)</p>
        <table class="paytable">
            <thead><tr><th>QTÉ</th><th>GAIN</th></tr></thead>
            <tbody><tr><td>1</td><td style="color:var(--accent)">50.00€</td></tr><tr><td>2</td><td style="color:var(--accent)">20.00€</td></tr><tr><td>6</td><td>0.00€</td></tr></tbody>
        </table>
        <button class="btn-main" style="height:45px; margin-top:20px;" onclick="toggleModal(false)">RETOUR</button>
    </div>
</div>

<div id="gameOverModal" class="modal" style="z-index: 5000;">
    <div class="modal-content" style="text-align:center;"><h2 style="color:var(--loss);">CREDIT ÉPUISÉ</h2><button class="btn-main" style="background: var(--accent); margin-top:20px;" onclick="location.reload()">RECHARGER</button></div>
</div>

<script>
    let solde = 100, ticket = [], isGameOver = false, globalTaxes = 0, openedCases = 0;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function toggleModal(show) { document.getElementById('rulesModal').style.display = show ? 'flex' : 'none'; }

    function buy() {
        if(solde < 10) { document.getElementById('gameOverModal').style.display = 'flex'; return; }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        solde -= 10; isGameOver = false; openedCases = 0;
        document.getElementById('btn-buy').style.display = 'none';
        document.getElementById('ev-display').style.display = 'block';
        init(); upd();
    }

    function init() {
        const g = document.getElementById('grid'); g.innerHTML = '';
        ticket = [50, 20, 20, 0, 0, 0, 0, 0, 0].sort(()=>Math.random()-0.5);
        for(let i=0; i<9; i++) {
            let s = document.createElement('div'); s.className = 'sq'; s.id = `sq-${i}`;
            const content = ticket[i] > 0 
                ? `<div class="win-coin"><span>${ticket[i]}€</span></div>`
                : `<div class="loss-coin"><span>0€</span></div>`;
            s.innerHTML = `<div class="dual-container" id="dual-${i}"><div class="zone-scratch" onclick="handleScratch(${i})"><span class="icon">🔍</span></div><div class="zone-bet" onclick="placeBet(${i})"><span class="icon">🎯</span></div></div><div class="reveal-content">${content}</div>`;
            g.appendChild(s);
        }
    }

    function handleScratch(idx) {
        if(isGameOver || (9 - openedCases <= 2)) return;
        if(!document.getElementById(`sq-${idx}`).classList.contains('open')) {
            solde -= 0.10; globalTaxes += 0.10; document.getElementById(`sq-${idx}`).classList.add('open');
            openedCases++;
            if(ticket[idx] > 0) {
                let goldsLeft = ticket.filter((v, i) => v > 0 && !document.getElementById(`sq-${i}`).classList.contains('open')).length;
                if(goldsLeft === 0) finishGame(0, "TICKET ÉPUISÉ");
            }
            upd();
        }
    }

    function placeBet(idx) {
        if(isGameOver) return;
        solde -= 0.10; globalTaxes += 0.10; const val = ticket[idx]; solde += val;
        const sq = document.getElementById(`sq-${idx}`);
        sq.classList.add('open', val > 0 ? 'final-win' : 'final-loss');
        finishGame(val, val > 0 ? `GAGNÉ +${val}€` : "PERDU");
    }

    function finishGame(winVal, msg) {
        isGameOver = true;
        document.getElementById('res-zone').innerHTML = `<div style="font-size:1.8em; font-weight:900; color:${winVal > 0 ? 'var(--win)' : 'var(--loss)'}; margin: 10px 0;">${msg}</div>`;
        document.getElementById('ev-display').style.display = 'none';
        for(let i=0; i<9; i++) {
            const dual = document.getElementById(`dual-${i}`); if(dual) dual.style.display = 'none';
            document.getElementById(`sq-${i}`).classList.add('open');
        }
        setTimeout(() => { document.getElementById('btn-buy').style.display = 'block'; if(solde < 10) document.getElementById('gameOverModal').style.display = 'flex'; }, 1200);
        upd();
    }

    function upd() { 
        document.getElementById('bal').innerText = solde.toFixed(2); 
        document.getElementById('global-tax').innerText = globalTaxes.toFixed(2);
        let total = 0, count = 0;
        for(let i=0; i<9; i++){
            const sq = document.getElementById(`sq-${i}`);
            if(sq && !sq.classList.contains('open')){ total += ticket[i]; count++; }
        }
        document.getElementById('ev-display').innerText = `ESPÉRANCE DE GAIN : ${(count > 0 ? total/count : 0).toFixed(2)}€`;

        if ((9 - openedCases) <= 2 && !isGameOver) {
            for(let i=0; i<9; i++) {
                if(!document.getElementById(`sq-${i}`).classList.contains('open')) {
                    const dual = document.getElementById(`dual-${i}`);
                    if(dual) {
                        dual.innerHTML = `<div class="final-bet-container" onclick="placeBet(${i})"><span class="icon">🎯</span></div>`;
                    }
                }
            }
        }
    }
</script>
</body>
</html>
