<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR v5.1 - Transparent Pricing</title>
    <style>
        :root { 
            --primary: #4ecca3; 
            --danger: #e94560;  
            --bg: #1a1a2e;      
            --panel: rgba(22, 33, 62, 0.95); 
            --border: #3c3c5e;  
            --text-muted: #8888b3; 
        }
        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden;
        }

        .header-ui { 
            width: 100%; max-width: 400px; background: var(--panel); padding: 15px; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); 
            flex-shrink: 0; margin-bottom: 20px; box-shadow: 0 4px 25px rgba(0,0,0,0.6); 
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .solde-container { font-weight: bold; font-size: 1.1em; text-align: right; }
        .solde-label { color: var(--text-muted); margin-right: 5px; font-size: 0.8em; text-transform: uppercase; }
        .solde-val { color: var(--primary); text-shadow: 0 0 10px rgba(78,204,163,0.2); }

        .btn-rules { 
            background: transparent; color: var(--text-muted); border: 1px solid var(--border); 
            padding: 5px 15px; border-radius: 8px; font-size: 0.75em; cursor: pointer; 
        }
        .btn-rules:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.05); background: rgba(78, 204, 163, 0.05); }

        .btn-cashout { 
            background: var(--primary); color: #0a0a1a; border: none; padding: 15px; 
            border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; 
            display: flex; justify-content: center; align-items: center; gap: 12px;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.2);
        }
        .btn-cashout:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(78, 204, 163, 0.3); }
        .btn-cashout:disabled { background: #3c3c5e !important; opacity: 0.5; cursor: default; filter: grayscale(1); color: #8888b3; }
        
        .cashout-text, .cashout-val { font-size: 1.3em; letter-spacing: 0.5px; }

        .game-area { width: 100%; max-width: 400px; height: 410px; display: flex; flex-direction: column; flex-shrink: 0; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; height: 400px; width: 100%; }
        
        .cell { background: #101827; border: 2px solid #2d2d44; border-radius: 18px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .cell:hover:not(.revealed) { border-color: var(--danger); transform: scale(1.04) translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 10; background: #1a1a2e; }
        .cell.revealed { cursor: default; background: #0b0f19; border-color: #1f1f2e; }

        .scratch-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .coin { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2em; z-index: 1; }
        .coin-win { background: linear-gradient(145deg, #ffd700, #d4ac0d); color: #0a0a1a; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(212, 172, 13, 0.3); }
        .coin-loss { background: linear-gradient(145deg, #bdc3c7, #2c3e50); color: #fff; border: 3px solid #7f8c8d; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .footer-ui { width: 100%; max-width: 400px; height: 100px; flex-shrink: 0; margin-top: 15px; }
        
        .btn-new { 
            background: var(--danger); color: white; border: none; padding: 14px; 
            border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 8px; font-size: 1em; 
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2);
        }
        .btn-new:hover { background: #ff506b; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(233, 69, 96, 0.3); }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(6px); justify-content: center; align-items: center; }
        .modal-content { background: #16213e; padding: 25px; border-radius: 20px; border: 1px solid rgba(78, 204, 163, 0.2); max-width: 360px; width: 92%; line-height: 1.4; box-shadow: 0 10px 40px rgba(0,0,0,0.7); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-content h2 { color: var(--primary); margin: 0 0 15px 0; font-size: 1.4em; border-bottom: 1px solid #2d2d44; padding-bottom: 10px; }
        .distrib-table { width: 100%; margin: 15px 0; border-collapse: collapse; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; border: 1px solid #2d2d44; }
        .distrib-table th, .distrib-table td { padding: 10px; border: 1px solid #2d2d44; text-align: center; }
        .distrib-table th { background: rgba(78, 204, 163, 0.05); color: var(--primary); font-size: 0.8em; }

        .close-modal, .recharge-modal { background: var(--primary); color: #0a0a1a; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; box-shadow: 0 4px 15px rgba(78, 204, 163, 0.2); }
        .recharge-modal { background: var(--danger); color: white; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2); }
        
        .modal-btn-alt { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 10px; margin-top: 10px; width: 100%; border-radius: 10px; cursor: pointer; }

        @keyframes slideUp { 0% { transform: translateY(15px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-ui">
        <div class="top-bar">
            <button class="btn-rules" onclick="toggleModal('rulesModal', true)">RÈGLES & GAINS</button>
            <div class="solde-container">
                <span class="solde-label">SOLDE</span>
                <span id="display-solde" class="solde-val">100.00 €</span>
            </div>
        </div>
        <button id="btn-cashout" class="btn-cashout" onclick="cashOut()" disabled title="Grattez une case pour encaisser">
            <span class="cashout-text">ENCAISSER</span>
            <span id="btn-val-esperance" class="cashout-val">11.00 €</span>
        </button>
    </div>

    <div class="game-area">
        <div class="grid" id="grid"></div>
    </div>

    <div id="footer-ui" class="footer-ui">
        <button class="btn-new" onclick="buyTicket()" id="btn-initial-buy">ACHETER UN BILLET (11.00 €)</button>
    </div>

    <div id="rulesModal" class="modal">
        <div class="modal-content">
            <h2>Règles & Répartition</h2>
            <p style="font-size: 0.9em; color: #b3b3cc;">Prix du billet : <b>11.00 €</b></p>
            <table class="distrib-table">
                <thead><tr><th>MONTANT</th><th>QUANTITÉ</th></tr></thead>
                <tbody>
                    <tr><td style="color:#ffd700; font-weight:bold;">50.00 €</td><td>1</td></tr>
                    <tr><td style="color:#ffd700; font-weight:bold;">20.00 €</td><td>2</td></tr>
                    <tr><td style="color:var(--text-muted);">0.00 €</td><td>6</td></tr>
                </tbody>
            </table>
            <p style="font-size: 0.85em; color: #b3b3cc;">• Encaissez l'espérance à tout moment.<br>• 3 lots trouvés = Ticket perdu (0€).</p>
            <button class="close-modal" onclick="toggleModal('rulesModal', false)">RETOUR AU RADAR</button>
        </div>
    </div>

    <div id="bankruptModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <div style="font-size: 3em; margin-bottom: 10px;">📉</div>
            <h2 style="color: var(--danger); border-color: var(--danger);">Solde Insuffisant</h2>
            <p style="color: #b3b3cc;">Vous n'avez plus assez de fonds pour acheter un billet (11.00 €).</p>
            <button class="recharge-modal" onclick="recharge(100)">RECHARGER 100.00 €</button>
            <button class="modal-btn-alt" onclick="toggleModal('bankruptModal', false)">ANNULER</button>
        </div>
    </div>

    <script>
        const LOTS_CONFIG = [50, 20, 20, 0, 0, 0, 0, 0, 0];
        let solde = 100.00, gridData = [], revealedCount = 0, lotsFoundCount = 0, gameOver = true, currentLotsInPlay = [];

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

        function recharge(amount) {
            solde += amount;
            updateUI();
            toggleModal('bankruptModal', false);
        }

        function buyTicket() {
            if (solde < 11) {
                toggleModal('bankruptModal', true);
                return;
            }
            solde -= 11;
            gridData = [...LOTS_CONFIG].sort(() => Math.random() - 0.5);
            currentLotsInPlay = [...LOTS_CONFIG].filter(v => v > 0);
            revealedCount = 0; lotsFoundCount = 0; gameOver = false;
            document.getElementById('footer-ui').innerHTML = '';
            document.getElementById('btn-cashout').disabled = true;
            generateGrid();
            updateUI();
        }

        function generateGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                const val = gridData[i];
                let coin = document.createElement('div');
                coin.className = val > 0 ? 'coin coin-win' : 'coin coin-loss';
                coin.innerText = val + '€';
                cell.appendChild(coin);
                let canvas = document.createElement('canvas');
                canvas.className = 'scratch-canvas';
                cell.appendChild(canvas);
                initVernis(canvas);
                cell.onclick = () => { if(!gameOver) triggerFracture(canvas, i); };
                gridEl.appendChild(cell);
            }
        }

        function initVernis(canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = 130; canvas.height = 130;
            ctx.fillStyle = '#4a4a4a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#555';
            for(let i=0; i<200; i++) ctx.fillRect(Math.random()*130, Math.random()*130, 1, 1);
        }

        function triggerFracture(canvas, index) {
            if (canvas.hasAttribute('data-revealed') || gameOver) return;
            canvas.setAttribute('data-revealed', 'true');
            canvas.parentElement.classList.add('revealed');
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2; const cy = canvas.height / 2;
            const sides = 24; const points = [];
            for (let i = 0; i < sides; i++) {
                const angle = (i / sides) * Math.PI * 2;
                const r = 60 * (0.85 + Math.random() * 0.3);
                points.push({x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r});
            }
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < sides; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.closePath(); ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 3; ctx.stroke();
            handleReveal(index);
        }

        function handleReveal(index) {
            const val = gridData[index];
            revealedCount++;
            if (val > 0) {
                lotsFoundCount++;
                const lotIdx = currentLotsInPlay.indexOf(val);
                if (lotIdx > -1) currentLotsInPlay.splice(lotIdx, 1);
            }
            if (revealedCount === 1) document.getElementById('btn-cashout').disabled = false;
            if (lotsFoundCount === 3) finishGame(0, "TICKET PERDU (3 GAINS)");
            else if (revealedCount === 8) finishGame(calculateEsperance(), "FIN DE PARTIE");
            else updateUI();
        }

        function calculateEsperance() {
            const sum = currentLotsInPlay.reduce((a, b) => a + b, 0);
            const hidden = 9 - revealedCount;
            return (hidden > 0) ? (sum / hidden) : 0;
        }

        function updateUI() {
            document.getElementById('btn-val-esperance').innerText = calculateEsperance().toFixed(2) + " €";
            document.getElementById('display-solde').innerText = solde.toFixed(2) + " €";
        }

        function cashOut() { if (!gameOver) finishGame(calculateEsperance(), "CASH OUT RÉUSSI"); }

        function finishGame(amount, reason) {
            gameOver = true; solde += amount; updateUI();
            document.getElementById('btn-cashout').disabled = true;
            const color = amount > 0 ? "var(--primary)" : "var(--danger)";
            document.getElementById('footer-ui').innerHTML = `
                <div class="end-card" style="border-color: ${color}; background: var(--panel); border: 1px solid ${color}; padding: 15px; border-radius: 15px; text-align: center; animation: slideUp 0.3s ease-out;">
                    <div style="font-size:0.75em; color:var(--text-muted); margin-bottom:5px; text-transform:uppercase;">${reason}</div>
                    <div style="font-size:1.6em; font-weight:bold; color:${color}">+ ${amount.toFixed(2)} €</div>
                    <button class="btn-new" onclick="buyTicket()">ACHETER UN BILLET (11.00 €)</button>
                </div>`;
            document.querySelectorAll('canvas').forEach((c) => {
                if(!c.hasAttribute('data-revealed')) {
                    c.style.opacity = "0"; setTimeout(() => c.remove(), 500);
                }
            });
        }
    </script>
</body>
</html>
