<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR 5/5 - Fast Pace Edition</title>
    <style>
        :root {
            --win: #27ae60; --loss: #e74c3c; --accent: #ffcc00;
            --bg: #0a0a0a; --card: #151515;
            --gold-multi: #ffcc00;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--bg); color: white;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        .container {
            width: 100%; max-width: 500px; height: 100%;
            background: var(--card); display: flex; flex-direction: row; position: relative;
            border-left: 1px solid #333; border-right: 1px solid #333;
        }

        .sidebar {
            width: 90px; background: #000; border-right: 2px solid #333;
            display: flex; flex-direction: column; padding: 10px 5px; gap: 10px;
            font-size: 0.5em; text-align: center;
        }

        .side-block { background: #111; padding: 8px 2px; border-radius: 6px; border: 1px solid #222; }
        .side-label { color: #666; font-size: 0.8em; display: block; text-transform: uppercase; }
        .side-val { font-weight: bold; color: var(--accent); font-size: 1.2em; display: block; }
        .val-solde { color: var(--win); border: 1px solid var(--win); background: #001a00; }

        .game-zone { flex: 1; display: flex; flex-direction: column; padding: 10px; position: relative; justify-content: center; }
        .grid-master { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        
        .sq {
            width: 100%; aspect-ratio: 1/1;
            background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid #333; position: relative; overflow: hidden;
        }

        .sq.open { background: #fff !important; border: none; color: #000; }
        .sq.revealed { opacity: 0.3; }
        
        .sq.target-gold { 
            background: var(--gold-multi) !important; color: #000; 
            font-weight: 900; font-size: 2.2em;
        }
        .sq.target-gold span { font-size: 0.4em; display: inline; margin-left: 1px; }
        .sq.target-loss { background: #333 !important; border: none; color: #111; font-size: 2em; }

        .sq-btns { display: flex; flex-direction: column; width: 100%; height: 100%; padding: 4px; gap: 4px; }
        .btn-tile {
            border: none; border-radius: 8px; color: white;
            font-size: 0.6em; font-weight: 900; cursor: pointer;
            text-transform: uppercase; display: flex; align-items: center; justify-content: center;
        }
        .btn-tile-scratch { flex: 2; background: #333; border: 1px solid #444; }
        .btn-tile-bet { flex: 1; background: var(--win); }
        .btn-tile:disabled { display: none; }

        .terminal {
            background: #000; border-top: 2px solid #333;
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 120px; padding: 15px; border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column; justify-content: center; z-index: 10;
        }

        .btn-main { padding: 20px; border: none; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1.1em; background: var(--accent); color: black; }

        .footer-info {
            width: 100%; max-width: 500px; height: 35px; background: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6em; color: #444; gap: 10px; border-top: 1px solid #222;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:rotate(0);} 25%{transform:rotate(-2deg);} 75%{transform:rotate(2deg);} }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="side-block val-solde">
            <span class="side-label">SOLDE</span>
            <span class="side-val" id="bal">100.00</span>€
        </div>
        <div class="side-block">
            <span class="side-label">TAXES</span>
            <span class="side-val" id="global-tax" style="color:var(--loss)">0.00</span>€
        </div>
        <div class="side-block">
            <span id="golds-found-ui" class="side-val">0/3</span>
            <span class="side-label">BRÛLÉS</span>
        </div>
        <div style="margin-top:auto;">
            <label style="font-size: 0.8em; color: #444; cursor:pointer;">
                <input type="checkbox" id="sound-on" checked> SON
            </label>
        </div>
    </div>

    <div class="game-zone">
        <div id="grid" class="grid-master"></div>

        <div class="terminal">
            <div id="buy-zone">
                <button id="btn-buy" class="btn-main" onclick="buy()">ACHETER TICKET (10€)</button>
            </div>
            <div id="res-zone" style="display:none; text-align:center;">
                <div id="res-msg" style="font-size: 1.2em;"></div>
            </div>
        </div>
    </div>
</div>

<div class="footer-info">
    <span>GRATTAGE: 0.10€</span> | <span>LOTS: 20€, 20€, 50€</span>
</div>

<script>
    let solde = 100, ticket = [], isGameOver = false;
    let globalTaxes = 0, currentMise = 10;
    let goldsFound = 0, openedCases = 0;
    
    const SCRATCH_FEE = 0.10;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, type, duration, vol=0.1) {
        if (!document.getElementById('sound-on').checked) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function upd() {
        document.getElementById('bal').innerText = solde.toFixed(2);
        document.getElementById('global-tax').innerText = globalTaxes.toFixed(2);
        document.getElementById('golds-found-ui').innerText = `${goldsFound}/3`;
        
        const remaining = 9 - openedCases;
        const scratchBtns = document.querySelectorAll('.btn-tile-scratch');
        scratchBtns.forEach(btn => {
            if (remaining <= 2) btn.style.display = 'none';
        });
    }

    function buy() {
        if(solde < currentMise) return alert("Solde insuffisant !");
        if(audioCtx.state === 'suspended') audioCtx.resume();
        solde -= currentMise; playSound(600, 'sine', 0.05);
        isGameOver = false; goldsFound = 0; openedCases = 0;
        document.getElementById('buy-zone').style.display='none';
        document.getElementById('res-zone').style.display='none';
        init(); upd();
    }

    function init() {
        const g = document.getElementById('grid'); g.innerHTML = '';
        ticket = [50, 20, 20, 0, 0, 0, 0, 0, 0].sort(()=>Math.random()-0.5);
        for(let i=0; i<9; i++) {
            let s = document.createElement('div'); s.className = 'sq'; s.id = `sq-${i}`;
            s.innerHTML = `
                <div class="sq-btns" id="btns-${i}">
                    <button class="btn-tile btn-tile-scratch" onclick="scratch(${i})">GRATTER</button>
                    <button class="btn-tile btn-tile-bet" onclick="placeBet(${i})">MISER</button>
                </div>
            `;
            g.appendChild(s);
        }
    }

    function revealAll() {
        for(let i=0; i<9; i++) {
            const sq = document.getElementById(`sq-${i}`);
            const btns = document.getElementById(`btns-${i}`);
            if(btns) btns.style.display = 'none';
            if(!sq.classList.contains('open')) {
                sq.classList.add('open', 'revealed');
                fillTile(sq, i);
            }
        }
        // DÉLAI RÉDUIT À 800ms
        setTimeout(() => {
            document.getElementById('res-zone').style.display = 'none';
            document.getElementById('buy-zone').style.display = 'block';
        }, 800);
    }

    function fillTile(el, idx) {
        if(ticket[idx] > 0) {
            el.innerHTML = `${ticket[idx]}<span>€</span>`;
            el.classList.add('target-gold');
        } else {
            el.innerText = 'X';
            el.classList.add('target-loss');
        }
    }

    function scratch(idx) {
        if(isGameOver || goldsFound >= 3) return;
        if(solde < SCRATCH_FEE) return;
        
        solde -= SCRATCH_FEE; globalTaxes += SCRATCH_FEE; openedCases++;
        document.getElementById(`btns-${idx}`).style.display = 'none';
        const sq = document.getElementById(`sq-${idx}`);
        sq.classList.add('open');
        fillTile(sq, idx);

        if(ticket[idx] > 0) {
            goldsFound++;
            if (goldsFound >= 3) {
                isGameOver = true; playSound(100, 'sawtooth', 0.5);
                endGame("ÉPUISÉ", false);
                revealAll();
            } else {
                playSound(400, 'sine', 0.1); upd();
            }
        } else {
            playSound(600, 'sine', 0.05); upd();
        }
    }

    function placeBet(idx) {
        if(isGameOver) return;
        isGameOver = true; openedCases++;
        const sq = document.getElementById(`sq-${idx}`);
        document.getElementById(`btns-${idx}`).style.display = 'none';
        sq.classList.add('open');
        fillTile(sq, idx);

        if(ticket[idx] > 0) {
            const win = ticket[idx];
            solde += win; playSound(800, 'triangle', 0.3);
            endGame(`SUCCÈS ! +${win}€`, true);
        } else {
            playSound(100, 'sawtooth', 0.5);
            endGame("PERDU", false);
        }
        revealAll();
    }

    function endGame(msg, win) {
        const zone = document.getElementById('res-zone');
        const m = document.getElementById('res-msg');
        zone.style.display = 'block';
        m.innerHTML = `<b style="color:${win ? 'var(--win)' : 'var(--loss)'}">${msg}</b>`;
        if(!win) document.getElementById('grid').classList.add('shake');
        upd();
    }
    upd();
</script>
</body>
</html>
